<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome — Essy's 19th Birthday</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700;900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <style>
    :root {
      --gold: #d4af37;
      --gold-light: #f5d77e;
      --purple-deep: #3b0066;
      --purple-mid: #6a0dad;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Raleway', sans-serif;
      color: #fff;
      background: #000;
    }

    /* ── VIDEO BG ── */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(59,0,102,0.45) 0%, rgba(106,13,173,0.35) 40%, rgba(59,0,102,0.50) 100%);
      z-index: 1;
    }

    /* ── CONFETTI ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* ── SPARKLES ── */
    .sparkle {
      position: fixed;
      border-radius: 50%;
      background: var(--gold-light);
      pointer-events: none;
      animation: twinkle 3s infinite;
      z-index: 2;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* ── MAIN CONTENT ── */
    .welcome-wrap {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* ── ENVELOPE ANIMATION ── */
    .envelope-wrap {
      position: relative;
      width: 120px;
      height: 88px;
      margin-bottom: 2rem;
      cursor: pointer;
    }

    .envelope {
      width: 120px;
      height: 88px;
      background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.08));
      border: 2px solid var(--gold);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .envelope::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-top: 44px solid transparent;
      border-left: 60px solid rgba(212,175,55,0.25);
      border-right: 60px solid rgba(212,175,55,0.25);
    }

    .envelope::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 0;
      border-bottom: 44px solid rgba(212,175,55,0.3);
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
    }

    .envelope-heart {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.8rem;
      z-index: 2;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1); }
      50% { transform: translate(-50%,-50%) scale(1.2); }
    }

    /* ── LOGO / TAG ── */
    .hbd-tag {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 10vw, 6rem);
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 40px rgba(212,175,55,0.6), 0 0 80px rgba(212,175,55,0.2);
      animation: glow 2.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px rgba(212,175,55,0.5), 2px 2px 0 rgba(0,0,0,0.4); }
      to   { text-shadow: 0 0 50px rgba(212,175,55,0.9), 0 0 100px rgba(212,175,55,0.3), 2px 2px 0 rgba(0,0,0,0.4); }
    }

    .welcome-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 4.5rem);
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 0.06em;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    }

    .welcome-name .number {
      font-style: italic;
      color: var(--gold);
    }

    .welcome-tagline {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-weight: 300;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* ── DIVIDER ── */
    .gold-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.8rem auto;
      width: min(400px, 80vw);
    }

    .gold-divider span {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .gold-divider i { color: var(--gold); font-size: 1rem; }

    /* ── WELCOME TEXT ── */
    .welcome-msg {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      line-height: 1.85;
      color: rgba(255,255,255,0.8);
      max-width: 540px;
      margin: 0 auto 2.2rem;
    }

    /* ── ENTER BUTTON ── */
    .btn-enter {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--gold);
      color: #1a0030;
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      padding: 0.9rem 2.8rem;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: btn-breathe 2.5s ease-in-out infinite;
    }

    @keyframes btn-breathe {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,175,55,0.5); }
      50% { box-shadow: 0 0 0 14px rgba(212,175,55,0); }
    }

    .btn-enter:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(212,175,55,0.7) !important;
      color: #1a0030;
      animation: none;
    }

    .btn-enter::before {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 40%;
      height: 200%;
      background: rgba(255,255,255,0.25);
      transform: skewX(-20deg);
      transition: left 0.5s;
    }

    .btn-enter:hover::before { left: 120%; }

    /* ── PAGE TRANSITION ── */
    #page-out {
      position: fixed;
      inset: 0;
      background: var(--purple-deep);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #page-out.active { opacity: 1; pointer-events: all; }

    /* ── MUTE BUTTON ── */
    #mute-btn {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      z-index: 100;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(30,0,55,0.7);
      border: 1.5px solid rgba(212,175,55,0.6);
      color: var(--gold);
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.15s;
    }
    #mute-btn:hover { background: var(--gold); color: var(--purple-deep); transform: scale(1.1); }

    /* ── DATE BADGE ── */
    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.35);
      border-radius: 50px;
      padding: 0.4rem 1.2rem;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      color: var(--gold-light);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
  </style>
</head>

<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="Media/WhatsApp Video 2026-05-25 at 9.23.38 PM.mp4" type="video/mp4" />
</video>

<div class="overlay"></div>
<canvas id="confetti-canvas"></canvas>

<!-- Page-out overlay for transition -->
<div id="page-out"></div>

<!-- Hidden audio -->
<audio id="bg-audio" loop>
  <source src="song/yung kai - blue (Lyrics) [4adZ7AguVcw].mp3" type="audio/mpeg" />
</audio>

<!-- Mute toggle -->
<button id="mute-btn" title="Mute / Unmute">
  <i class="bi bi-volume-up-fill" id="mute-icon"></i>
</button>

<!-- Main Welcome Content -->
<div class="welcome-wrap">

  <!-- Floating envelope -->
  <div class="envelope-wrap mb-2">
    <div class="envelope">
      <span class="envelope-heart">💜</span>
    </div>
  </div>

  <!-- Date badge -->
  <div class="date-badge">
    <i class="bi bi-calendar-heart"></i>
    A Special Celebration
  </div>

  <!-- Title -->
  <div class="hbd-tag">Happy Birthday</div>
  <div class="welcome-name mt-1">
    Essy <span class="number">19</span>
  </div>
  <div class="welcome-tagline">A Celebration of Joy &amp; Love</div>

  <!-- Divider -->
  <div class="gold-divider">
    <span></span>
    <i class="bi bi-stars"></i>
    <span></span>
  </div>

  <!-- Message -->
  <p class="welcome-msg">
    Today is all about you, Essy! Step inside to explore beautiful memories, celebrate nineteen incredible years, and feel the love from everyone who cares about you.
  </p>

  <!-- CTA -->
  <a href="celebrate.html" class="btn-enter" id="enterBtn">
    <i class="bi bi-door-open"></i>
    Enter the Celebration
  </a>

</div>

<script>
// ── SPARKLES ──────────────────────────────────────────────────────────────────
for (let i = 0; i < 35; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDelay = (Math.random() * 3) + 's';
  s.style.animationDuration = (2 + Math.random() * 3) + 's';
  const sz = (2 + Math.random() * 6) + 'px';
  s.style.width = sz; s.style.height = sz;
  document.body.appendChild(s);
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const COLORS = ['#d4af37','#f5d77e','#9b59b6','#c39bd3','#fff','#e8c0e8','#ff9ecd'];

function spawn() {
  return {
    x: Math.random() * canvas.width, y: -10,
    r: 3 + Math.random() * 5,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    speed: 0.8 + Math.random() * 2,
    drift: (Math.random() - 0.5) * 1.2,
    rot: Math.random() * Math.PI * 2,
    rotS: (Math.random() - 0.5) * 0.1,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    w: 5 + Math.random() * 7, h: 3 + Math.random() * 4,
  };
}

for (let i = 0; i < 70; i++) { const p = spawn(); p.y = Math.random() * canvas.height; particles.push(p); }

(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach((p, i) => {
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.globalAlpha = 0.7;
    if (p.shape === 'rect') ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    else { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
    p.y += p.speed; p.x += p.drift; p.rot += p.rotS;
    if (p.y > canvas.height + 10) particles[i] = spawn();
  });
  requestAnimationFrame(loop);
})();

// ── AUDIO ─────────────────────────────────────────────────────────────────────
const audio    = document.getElementById('bg-audio');
const muteBtn  = document.getElementById('mute-btn');
const muteIcon = document.getElementById('mute-icon');
audio.volume   = 0.75;

function setMuteUI(muted) {
  muteIcon.className = muted ? 'bi bi-volume-mute-fill' : 'bi bi-volume-up-fill';
}

muteBtn.addEventListener('click', () => {
  audio.muted = !audio.muted;
  setMuteUI(audio.muted);
});

// Autoplay — save position before leaving so celebrate.html can continue
function tryPlay() { audio.play().catch(() => {}); }
window.addEventListener('load', tryPlay);
document.addEventListener('click',      function once() { tryPlay(); document.removeEventListener('click', once); }, { once: true });
document.addEventListener('touchstart', function once() { tryPlay(); document.removeEventListener('touchstart', once); }, { once: true });


// ── PAGE TRANSITION ───────────────────────────────────────────────────────────
document.getElementById('enterBtn').addEventListener('click', function(e) {
  e.preventDefault();
  sessionStorage.setItem('blue_time',  audio.currentTime);
  sessionStorage.setItem('blue_muted', audio.muted);
  const out = document.getElementById('page-out');
  out.classList.add('active');
  setTimeout(() => { window.location.href = this.href; }, 650);
});
</script>
</body>
</html>
